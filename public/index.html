<!DOCTYPE html>
<html lang="en">
  <head>
    <% const publicOrigin = typeof VUE_APP_PUBLIC_ORIGIN !== 'undefined' ? VUE_APP_PUBLIC_ORIGIN : ''; %>
    <% const socialImage = publicOrigin ? `${publicOrigin}/social-media.png` : '/social-media.png'; %>
    <% const canonicalUrl = publicOrigin || '/'; %>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" href="<%= BASE_URL %>favicon.ico" />
    <title>Krimi: A game of deduction and deception</title>
    <!-- Search Engine -->
    <meta name="description" content="A game of deduction and deception." />
    <meta name="image" content="<%= socialImage %>" />
    <!-- Schema.org for Google -->
    <meta itemprop="name" content="Krimi" />
    <meta itemprop="description" content="A game of deduction and deception." />
    <meta itemprop="image" content="<%= socialImage %>" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Krimi" />
    <meta
      name="twitter:description"
      content="A game of deduction and deception."
    />
    <meta name="twitter:site" content="@raphaelaleixo" />
    <meta name="twitter:creator" content="@raphaelaleixo" />
    <meta name="twitter:image:src" content="<%= socialImage %>" />
    <!-- Open Graph general (Facebook, Pinterest & Google+) -->
    <meta property="og:title" content="Krimi" />
    <meta property="og:description" content="A game of deduction and deception." />
    <meta property="og:image" itemprop="image" content="<%= socialImage %>" />
    <meta property="og:url" content="<%= canonicalUrl %>" />
    <meta property="og:site_name" content="Krimi" />
    <meta name="fb:admins" content="717871649" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <noscript>
      <strong
        >We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work
        properly without JavaScript enabled. Please enable it to
        continue.</strong
      >
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
